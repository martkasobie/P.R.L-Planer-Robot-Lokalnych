name: Poranna Syrena PRL

on:
  schedule:
    # 6:50 UTC to dokładnie 8:50 czasu letniego w Polsce (CEST).
    - cron: '50 6 * * *'
  workflow_dispatch: 

jobs:
  budzik:
    runs-on: ubuntu-latest
    
    # Ta linijka mówi GitHubowi: "Tak, wiem o reformie, używaj silnika 24!"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Klonowanie akt (Checkout)
        uses: actions/checkout@v4

      - name: Uruchomienie maszyny losującej (Setup Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Zmieniliśmy z 20 na 24!

      - name: Pobieranie biurokratycznych narzędzi (NPM)
        run: npm install firebase-admin

      - name: Odpalenie Syreny!
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node send_notifications.js
